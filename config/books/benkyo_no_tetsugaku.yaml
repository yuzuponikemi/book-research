book:
  title: "勉強の哲学 来たるべきバカのために"
  title_ja: "勉強の哲学 来たるべきバカのために"
  author: "千葉雅也"
  author_ja: "千葉雅也"
  year: 2017

source:
  type: "web"

chunking:
  strategy: "token"
  max_tokens: 15000

research:
  search_queries:
    - "勉強の哲学 千葉雅也 ノリ 自己破壊 環境変化"
    - "勉強の哲学 千葉雅也 アイロニー ユーモア 享楽"
    - "勉強の哲学 千葉雅也 言語 脱コード化 ドゥルーズ"
    - "千葉雅也 勉強 バカ コード 来たるべき"
  reference_files: []
  max_search_results: 5

web_research:
  headings:
    - id: "philosophy_of_study_intro"
      title: "勉強の哲学とは何か"
      description: "勉強を哲学的に問い直す出発点。自己破壊・環境変化としての勉強観の導入。"
    - id: "nori_and_code"
      title: "ノリとコード——社会的同調からの離脱"
      description: "『ノリ』（社会的雰囲気・同調圧力）と『コード』（慣習・言語ゲーム）の概念。勉強とはノリから抜け出す実践。"
    - id: "self_destruction"
      title: "自己破壊としての勉強"
      description: "勉強は既存の自己・価値観を壊すプロセスであるという中核命題。環境を変えることで生じる断絶。"
    - id: "language_and_decoding"
      title: "言語の複数性と脱コード化（ドゥルーズ）"
      description: "ドゥルーズの脱コード化概念を援用し、複数の言語・コードに接触することで固定化を崩す方法論。"
    - id: "jouissance_and_desire"
      title: "享楽（ジュイサンス）と欲望——ラカンの援用"
      description: "ラカン精神分析の享楽概念。勉強における欲望のあり方と、享楽を手放す/利用するという問い。"
    - id: "irony"
      title: "アイロニー——距離の技法"
      description: "アイロニーとは自分の立場から距離を取る態度。勉強初期段階で既存コードを相対化する姿勢。"
    - id: "humor"
      title: "ユーモア——新たな肯定の技法"
      description: "ユーモアはアイロニーを超えた積極的肯定。新しい自己・価値観を笑いとともに受け入れる態度。"
    - id: "output_and_new_self"
      title: "アウトプットと新しい自己の形成"
      description: "勉強の成果をアウトプットすることで新しい自己が生まれる。書くこと・話すことの実践論。"
    - id: "the_coming_idiot"
      title: "来たるべきバカ——勉強後の自己"
      description: "勉強によって変容した自己を『来たるべきバカ』と呼ぶ。旧来の意味での賢さを失い、新たな地平に立つ存在。"

context:
  era: "2017年"
  tradition: "哲学、教育論、現代思想、ドゥルーズ哲学、ラカン精神分析"
  key_terms:
    - "ノリ（社会的同調の雰囲気）"
    - "自己破壊としての勉強"
    - "環境の切断・移行"
    - "言語の複数性とコード"
    - "アイロニー"
    - "ユーモア"
    - "享楽（ジュイサンス）"
    - "脱コード化（ドゥルーズ）"
    - "来たるべきバカ"
    - "勉強の哲学的意義"

prompt_fragments:
  work_description: >
    千葉雅也「勉強の哲学 来たるべきバカのために」（2017年、文藝春秋）。
    勉強とは自己破壊であり、環境を変え言語を変えることで「ノリ」から抜け出す実践論。
    ドゥルーズの脱コード化・ラカンの享楽概念を援用し、アイロニーとユーモアという
    二つの態度を軸に、勉強がいかに人を変えるかを論じる。
