prompt_fragments:
  work_description: >
    Debord's "The Society of the Spectacle" (1967) opens: "All that was once directly
    lived has become mere representation." The spectacle is not a collection of images
    but a social relation among people mediated by images — the culmination of commodity
    logic in which appearance displaces being. The Situationist International proposed
    détournement and constructed situations as counter-practices.
  analysis_guidance: >
    Pay attention to: the spectacle as the autonomous movement of the non-living;
    the distinction between concentrated (totalitarian) and diffuse (consumer) spectacle,
    and the later "integrated spectacle" combining both; the connection between Debord's
    spectacle and contemporary social media feed logic; recuperation as the mechanism
    by which radical critique is absorbed and sold back; the Situationist concept of
    dérive as a practice of spatial critique — contrast with algorithmic navigation.
