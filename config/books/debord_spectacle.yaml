  notable_critics:
    - name: "Baudrillard"
      perspective: "Extended spectacle into hyperreality — simulation replaces not just lived experience but the real itself"
    - name: "Fredric Jameson"
      perspective: "Situationist critique prefigures postmodern cultural logic; spectacle = cultural dominant of late capitalism"
    - name: "Anselm Jappe"
      perspective: "Situationist thought as critique of value-form rather than merely cultural politics"
    - name: "T.J. Clark"
      perspective: "Criticised Debord for over-unifying the concept; spectacle is more contradictory than Debord allows"
    - name: "Mark Fisher"
      perspective: "Capitalist realism as successor to spectacle: the impossibility of imagining alternatives"

lateral:
