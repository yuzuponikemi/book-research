book:
  title: "「風の谷」という希望"
  title_ja: "「風の谷」という希望"
  author: "安宅和人"
  author_ja: "安宅和人"
  year: 2022

source:
  type: "web"

chunking:
  strategy: "token"
  max_tokens: 15000

research:
  search_queries:
    - "安宅和人 風の谷 希望 文明転換 持続可能"
    - "安宅和人 風の谷 地方創生 小規模自律コミュニティ"
    - "安宅和人 シン・ニホン 風の谷 人口減少 日本再生"
    - "安宅和人 風の谷 デジタルネイチャー 自然 テクノロジー"
    - "安宅和人 風の谷 農山漁村 エネルギー 食料 教育"
  reference_files: []
  max_search_results: 5

context:
  era: "2022年（ポストコロナ・気候変動時代）"
  tradition: "社会デザイン、地域論、テクノロジー論、文明論、持続可能性"
  key_terms:
    - "「風の谷」モデル（小規模・自律・持続可能なコミュニティ）"
    - "文明の転換（化石燃料文明から次の文明へ）"
    - "人口減少・少子化（日本が直面する構造的問題）"
    - "地方の再生（農山漁村の可能性と役割）"
    - "デジタルと自然の融合（テクノロジーの民主化）"
    - "持続可能なエネルギー・食料システム"
    - "知的創造と教育の再定義"
    - "希望のアーキテクチャ（新しい社会設計の原理）"
    - "自律分散型社会（中央集権からの脱却）"
    - "ナウシカ的ビジョン（宮崎駿「風の谷のナウシカ」との対話）"

prompt_fragments:
  work_description: >
    安宅和人「「風の谷」という希望」（2022年、NewsPicks パブリッシング）。
    化石燃料文明の終焉と人口減少という二重の危機を前に、
    宮崎駿「風の谷のナウシカ」に触発された「風の谷」モデル——
    小規模・自律・持続可能な地域コミュニティ——を提唱し、
    デジタル技術と自然の融合によって農山漁村から日本と世界を再生する、
    希望のビジョンと具体的処方箋を描く社会デザインの書。

web_research:
  headings:
    - id: "bunmei_tenkan"
      title: "文明の転換——化石燃料文明の終わりと次の時代"
      description: "化石燃料に依存した近代文明が構造的限界を迎えつつある現実。気候変動・資源枯渇・人口動態の変化が重なり合う中で、次の文明をどう設計するかという根本的問いを提起する。"
    - id: "kaze_no_tani_model"
      title: "「風の谷」モデル——小規模・自律・持続可能なコミュニティ設計"
      description: "宮崎駿「風の谷のナウシカ」のビジョンを現実の社会設計に転換した「風の谷」モデルの構造。小規模・自律・持続可能の三原則に基づくコミュニティの具体像と、その実現可能性の根拠。"
    - id: "jinko_gensho"
      title: "人口減少という現実——危機か、それとも機会か"
      description: "日本が直面する少子高齢化・人口減少を単なる危機としてではなく、社会を再設計する機会として捉え直す視点。地方消滅論への反論と、新しい人口・地域分布の可能性。"
    - id: "chiho_saigo"
      title: "地方の可能性——農山漁村から始まる再生"
      description: "過疎・衰退とみなされてきた農山漁村が、実は次の文明における最重要資産（土地・水・食料・エネルギー・コミュニティ知）を持つという逆転の発想。地方創生の本質的な意味と実践。"
    - id: "digital_shizen"
      title: "デジタルと自然の融合——テクノロジーの民主化"
      description: "デジタル技術（AI・IoT・再生可能エネルギー技術）が小規模コミュニティでも利用可能なレベルまで民主化されたことで、「風の谷」が現実的選択肢になりつつある構造変化の分析。"
    - id: "energy_food_system"
      title: "エネルギーと食料の自律——持続可能システムの設計"
      description: "再生可能エネルギーと地産地消の食料システムを組み合わせた、地域の自給自足的な循環経済の設計原理。中央依存から脱した地域の経済的・物理的自立の条件。"
    - id: "chishiki_kyoiku"
      title: "知的創造と教育の再定義——人を育てる場としての「風の谷」"
      description: "「風の谷」における知識・教育・創造の役割。中央集権的な教育システムへの批判と、地域に根ざした知的コミュニティとしての新しい学びの形。安宅の「シン・ニホン」的な人材論との接続。"
    - id: "kibou_architecture"
      title: "希望のアーキテクチャ——新しい社会を設計する思想"
      description: "本書全体を貫く「希望」の思想的構造。絶望でも楽観でもなく、具体的な設計によって未来を切り開くという著者の実践的思想。「シン・ニホン」以降の安宅思想の深化と社会変革の処方箋。"
