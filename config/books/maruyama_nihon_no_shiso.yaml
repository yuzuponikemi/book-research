book:
  title: "日本の思想"
  title_ja: "日本の思想"
  author: "丸山眞男"
  author_ja: "丸山眞男"
  year: 1961

source:
  type: "web"

chunking:
  strategy: "token"
  max_tokens: 15000

research:
  search_queries:
    - "丸山眞男 日本の思想 タコつぼ型 ささら型 無構造"
    - "丸山眞男 古層 執拗低音 日本思想の基底"
    - "丸山眞男 超国家主義 国体論 近代日本"
    - "丸山眞男 である すること 存在と行為"
    - "丸山眞男 思想の雑居 外来思想 主体的摂取"
  reference_files: []
  max_search_results: 5

context:
  era: "1961年（戦後日本思想）"
  tradition: "政治思想、日本思想史、近代批判、戦後啓蒙"
  key_terms:
    - "無構造な思想的伝統"
    - "タコつぼ型（専門分化・閉鎖性）"
    - "ささら型（横断的・開放的連携）"
    - "古層・執拗低音（basso ostinato）"
    - "超国家主義と国体論"
    - "「である」ことと「する」こと"
    - "思想の「雑居」と感染"
    - "主体的摂取（能動的受容）"
    - "近代的思惟の欠如"
    - "日本における自由意識"

prompt_fragments:
  work_description: >
    丸山眞男「日本の思想」（1961年、岩波新書）。
    日本の思想に貫かれた「無構造性」を分析し、タコつぼ型の専門分化・思想的孤立、
    古層（執拗低音）による伝統の根強さ、超国家主義の構造、
    「である」vs「する」という存在論的対立を通じて、
    近代日本の思想的欠陥と変革の可能性を問う戦後啓蒙の主著。

web_research:
  headings:
    - id: "mukozo_shiso"
      title: "日本思想の無構造性——座標軸の欠如"
      description: "日本の思想的伝統が西洋のような対抗軸（古代vs近代、宗教vs世俗など）を欠き、あらゆる外来思想が無批判に流入・共存してきた「無構造」の問題。"
    - id: "takotsubo_sasara"
      title: "タコつぼ型とささら型——組織と学問の構造"
      description: "タコつぼ型（各専門領域が孤立・閉鎖した蛸壺のような構造）とささら型（横断的・開放的な連携）の対比。日本の学問・組織がタコつぼ型に陥る傾向とその弊害。"
    - id: "kosou_basso_ostinato"
      title: "古層・執拗低音——日本思想の基底"
      description: "日本思想の底流に流れる変えがたい「古層」（basso ostinato）。外来思想が次々と上書きされても消えない、なりゆき・つぎつぎと・もののあわれ等の原型的思惟パターン。"
    - id: "chokokukkashugi_kokutai"
      title: "超国家主義と国体論——近代日本の政治思想"
      description: "近代日本において国家が道徳的最高価値となった超国家主義の構造分析。天皇制・国体論がいかに個人の内面的責任を解体し、無責任体系を生み出したか。"
    - id: "de_aru_to_suru"
      title: "「である」ことと「する」こと——存在と行為の倫理"
      description: "身分・属性（「である」）を優先する封建的価値観と、機能・行為（「する」）を重視する近代的価値観の対立。日本社会において「である」論理が「する」論理を圧倒するメカニズム。"
    - id: "shiso_no_zakkyo"
      title: "思想の「雑居」と感染——外来思想の受容様式"
      description: "日本が外来思想（儒教、仏教、西洋近代思想）を「主体的に摂取」するのではなく、「感染」「雑居」として受け入れてきた様式。思想的主体の不在という問題。"
    - id: "kindai_thinki"
      title: "近代的思惟の成立と欠如——西洋との比較"
      description: "西洋近代において思想の基軸（自然法、個人の権利、歴史の発展観）がいかに形成されたか。日本近代がその内発的形成を欠いたまま外圧によって近代化した構造的問題。"
    - id: "jiyu_ishiki"
      title: "日本における自由意識の形成と特質"
      description: "日本において自由・権利意識がいかに「内面化」されずに制度的・外在的なものにとどまってきたか。戦後民主主義の可能性と限界の問い。"
