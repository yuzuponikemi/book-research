    - "PICSY（Propagational Investment Currency System／伝播投資貨幣システム）"
    - "分人民主主義（Dividual Democracy）"
    - "構成的社会契約（Constitutive Social Contract）"
    - "伝播（Propagation）"
    - "離散的制度（Discrete Institutions）"
    - "連続体（Continuum）"
    - "国家・企業・核家族（その敵）"
    - "自然と自由"
    - "ネットワーク貨幣"
    - "投票権の伝播"
