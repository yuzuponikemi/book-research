prompt_fragments:
  work_description: >
    「なめらかな社会とその敵」（2013年、勁草書房）は、鈴木健による社会哲学・制度設計の著作。
    国家・企業・核家族といった「離散的・境界明確な制度」（＝「敵」）に代わり、
    伝播と連続性を原理とする「なめらかな社会」を構想する。
    核心的提案は三つ：① PICSY（伝播投資貨幣システム）―価値が社会ネットワーク上を
    伝播・希釈される貨幣設計；② 分人民主主義―投票権が委任・伝播によって分散する
    民主主義システム；③ 構成的社会契約―参加者の行為によって社会が構成される新たな
    社会契約論。自由と自然の関係、個人と集合体の境界をめぐる哲学的問いを軸に展開される。
  analysis_guidance: >
    以下の点に注目すること：PICSY の伝播メカニズムと既存の貨幣・信用システムとの差異；
    分人民主主義が一般意志・多数決民主主義のどの問題を解決しようとしているか；
    「なめらかさ」の哲学的意味（連続性・微分可能性・境界の溶解）；
    国家・企業・核家族がなぜ「敵」とされるか（離散性・硬直性の問題）；
    著者が想定する自由論・自然概念の位置づけ。
