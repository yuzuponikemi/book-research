web_research:
  headings:
    - id: "nameraka_philosophy"
      title: "なめらかさの哲学（連続性・微分可能性・境界の溶解）"
      description: "「なめらかさ」とは何か。離散と連続の対立、境界の溶解、微分可能性の社会的意味を問う本書の根幹概念"
    - id: "natural_intelligence"
      title: "自然知性（Natural Intelligence）"
      description: "鈴木が提唱する「自然知性」概念。人工知能との対比、社会システムに内在する知性、なめらかさが生み出す集合的知性"
    - id: "enemies"
      title: "離散的制度としての敵：国家・企業・核家族"
      description: "なぜ国家・企業・核家族が「敵」とされるか。境界明確な離散的制度が生む硬直性・排他性・権力集中の問題"
    - id: "picsy"
      title: "PICSY（伝播投資貨幣システム）のメカニズム"
      description: "価値が社会ネットワーク上を伝播・希釈される貨幣設計。既存の貨幣・信用・投資システムとの比較"
    - id: "dividual_democracy"
      title: "分人民主主義（Dividual Democracy）"
      description: "投票権の委任・伝播による流動的民主主義。一般意志・多数決民主主義の限界を超える構造"
    - id: "constitutive_social_contract"
      title: "構成的社会契約（Constitutive Social Contract）"
      description: "参加者の行為によって社会が構成されるという新たな社会契約論。ルソーの社会契約論との比較"
    - id: "individual_and_dividual"
      title: "個人と分人（Individual vs Dividual）"
      description: "「個人」概念の批判と「分人」概念の導入。平野啓一郎との共鳴・差異、自己の複数性と境界の問い"
    - id: "freedom_and_nature"
      title: "自由と自然の哲学的関係"
      description: "自由概念の再定義、自然と人間の連続性、なめらかな社会における自由論の位置づけ"
    - id: "propagation_mechanism"
      title: "伝播（Propagation）という原理"
      description: "価値・情報・影響力がネットワーク上で伝播・希釈されるメカニズム。伝播が生む社会的連帯と自己組織化"
    - id: "social_systems_dialogue"
      title: "社会システム論・複雑系との対話"
      description: "ルーマンの社会システム論、複雑系科学、ネットワーク理論との関係。本書の理論的背景と位置づけ"
    - id: "feasibility_critique"
      title: "なめらかな社会の実現可能性と批判的検討"
      description: "提案の実装可能性、技術的前提、予想される反論、既存制度との摩擦点"

