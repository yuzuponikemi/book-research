  include_arxiv: true

prompt_fragments:
  work_description: >
    Zuboff's "The Age of Surveillance Capitalism" (2019) identifies a new economic logic
    in which human experience is unilaterally claimed as raw material for behavioral data.
    This "behavioral surplus" — exceeding what is needed to improve services — is fed into
    prediction products sold on behavioral futures markets. The Big Other is the automated
    architecture that observes, nudges, and modifies human behavior at scale.
  analysis_guidance: >
    Pay attention to: behavioral surplus as the original extraction mechanism — compare to
    Baudrillard's sign value and Veblen's conspicuous consumption as earlier moments of
    capitalist abstraction; the Big Other vs. Foucault's panopticon — surveillance
    capitalism requires compliant subjects, not disciplined ones; instrumentarian power
    as a third logic alongside totalitarianism and democracy; the connection between
    Zuboff's prediction products and AI RLHF/fine-tuning pipelines; epistemic inequality
    as the asymmetry between those who know and those who are known.
