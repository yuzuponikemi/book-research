  notable_critics:
    - name: "Baudrillard"
      perspective: "Zuboff's surveillance capitalism as the operational realization of hyperreality — behavioral data as the ultimate simulacrum"
    - name: "Foucault"
      perspective: "Zuboff builds on panopticon theory but argues surveillance capitalism differs: it modifies behavior for profit rather than discipline for social order"
    - name: "Nick Couldry & Ulises Mejias"
      perspective: "Data colonialism as parallel framework — critiques Zuboff for focusing on corporations rather than structural colonialism"
    - name: "Evgeny Morozov"
      perspective: "Criticised Zuboff for ignoring political economy; surveillance capitalism is inseparable from neoliberal state"
    - name: "Tim Wu"
      perspective: "The Attention Merchants as complementary analysis — attention economy as precursor to behavioral modification"

lateral:
